logging:
  level:
    org.springframework.data.redis: DEBUG
    com.codemonkey.url.shortener: DEBUG

spring:
  application:
    name: url-shortener
  api:
    version: v1
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000
    mongodb:
      uri: mongodb://localhost:27017/urlshortener
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
