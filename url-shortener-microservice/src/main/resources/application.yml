logging:
  level:
    org.springframework.data.redis: DEBUG
    com.codemonkey.url.shortener: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always

spring:
  application:
    name: url-shortener
  api:
    version: v1
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000
    mongodb:
      uri: mongodb://localhost:27017/urlshortener
